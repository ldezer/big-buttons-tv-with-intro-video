name: Build Big Buttons TV Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-tv-release-apk:
    runs-on: ubuntu-24.04
    env:
      CI: true
      EXPO_NO_TELEMETRY: 1
      NODE_ENV: production

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Generate Android project
        run: pnpm exec expo prebuild --platform android --clean --no-install

      - name: Fix Gradle memory and signing
        run: |
          printf '\norg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8\nnewArchEnabled=true\n' >> android/gradle.properties
          if [ -f android/app/build.gradle ]; then
            sed -i 's/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/g' android/app/build.gradle || true
          fi

      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Collect APK
        run: |
          mkdir -p apk-output
          cp android/app/build/outputs/apk/release/*.apk apk-output/Big-Buttons-TV-fixed-release.apk
          ls -lh apk-output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: big-buttons-tv-fixed-release-apk
          path: apk-output/Big-Buttons-TV-fixed-release.apk
